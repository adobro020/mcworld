<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>McWorld</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #player {
      width: 100vw;
      height: 100vh;
      min-width: 978px;
      min-height: 770px;
      background: #000;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
    }

    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #000;
      color: #fff;
      text-align: center;
      z-index: 2;
    }

    #status[hidden] {
      display: none;
    }

    .panel {
      max-width: 560px;
      line-height: 1.45;
    }

    .title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
    }

    .message {
      margin: 0;
      color: #d7d7d7;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="status">
    <div class="panel">
      <p class="title">Loading McWorld...</p>
      <p class="message">Preparing the archived Flash client in a modern browser.</p>
    </div>
  </div>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "visible",
      backgroundColor: "#000000",
      allowScriptAccess: true,
      allowFullscreen: true,
      allowNetworking: "all",
      compatibilityRules: true,
      upgradeToHttps: false,
      playerVersion: 10,
      wmode: "transparent"
    };

    const statusEl = document.getElementById("status");
    const statusTitle = statusEl.querySelector(".title");
    const statusMessage = statusEl.querySelector(".message");
    const ruffleSources = [
      "https://unpkg.com/@ruffle-rs/ruffle",
      "https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle",
      "https://cdnjs.cloudflare.com/ajax/libs/ruffle-rs/0.2.0-nightly.2025.9.29/ruffle.js"
    ];

    function setStatus(title, message) {
      statusEl.hidden = false;
      statusTitle.textContent = title;
      statusMessage.textContent = message;
    }

    function hideStatusSoon() {
      window.setTimeout(() => {
        statusEl.hidden = true;
      }, 1200);
    }

    function loadScript(index) {
      return new Promise((resolve, reject) => {
        if (index >= ruffleSources.length) {
          reject(new Error("Ruffle could not be loaded."));
          return;
        }

        const script = document.createElement("script");
        script.src = ruffleSources[index];
        script.async = true;
        script.onload = resolve;
        script.onerror = () => loadScript(index + 1).then(resolve, reject);
        document.head.appendChild(script);
      });
    }

    function buildFlashVars() {
      const rootURL = new URL("./", document.baseURI).href;
      const localeURL = new URL("en_US/", document.baseURI).href;

      return {
        configURL: "en_US/config/config.xml",
        serverURL: rootURL,
        serviceGatewayURL: new URL("virtualworld/RemoteService", rootURL).href,
        baseURL: localeURL,
        mapsDIR: "swf3/maps/",
        npcsDIR: "swf3/npcs/",
        localeDIR: "en_US/",
        swf3DIR: "swf3/",
        env: "localhost"
      };
    }

    function boot() {
      if (location.protocol === "file:") {
        setStatus(
          "Open this through a local web server",
          "Modern browsers block some local SWF, XML, and audio requests from file:// pages. The page is ready, but it works best from a local server."
        );
      }

      const baseURL = new URL("en_US/", document.baseURI).href;
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("player");

      container.appendChild(player);
      player.ruffle().load({
        url: "en_US/swf3/PlayerClient.swf",
        parameters: buildFlashVars(),
        autoplay: "on",
        unmuteOverlay: "visible",
        backgroundColor: "#000000",
        allowScriptAccess: true,
        allowFullscreen: true,
        allowNetworking: "all",
        compatibilityRules: true,
        upgradeToHttps: false,
        playerVersion: 10,
        wmode: "transparent",
        urlRewriteRules: [
          [/^https?:\/\/mcworld\.happymeal\.com(?::80)?\/en_US\//i, baseURL],
          [/^https?:\/\/localhost(?::80)?\/en_US\//i, baseURL],
          [/^\/en_US\//i, baseURL]
        ]
      }).then(hideStatusSoon).catch((error) => {
        setStatus("Could not start McWorld", error.message);
      });
    }

    loadScript(0).then(boot).catch((error) => {
      setStatus("Could not load the Flash emulator", error.message);
    });
  </script>
</body>
</html>
